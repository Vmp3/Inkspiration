# =============================================================================
# INKSPIRATION TEST CONFIGURATION
# Configurações específicas para execução de testes
# =============================================================================

# Server Configuration
server.port=8080

# Database Configuration (H2 in-memory para testes)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Configuration
spring.h2.console.enabled=false

# JWT Configuration (valores dummy para testes)
jwt.public.
jwt.private.
jwt.token.expiration.default=86400000
jwt.token.expiration.remember-me=604800000

# Email Configuration (valores dummy para testes)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=localhost

# Spring DevTools Configuration
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Logging Configuration
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.inkspiration=INFO

# Active Profile
spring.profiles.active=test 